<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: dark navy to slightly lighter -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2e"/>
      <stop offset="100%" style="stop-color:#0f2444"/>
    </linearGradient>

    <!-- Folder gradient: blue to purple -->
    <linearGradient id="folderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Folder front gradient: slightly lighter -->
    <linearGradient id="folderFrontGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>

    <!-- Star glow effect -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#bfdbfe;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>

    <!-- Nova burst glow (large) -->
    <radialGradient id="novaBurst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>

    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.06"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id="folderShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Star glow filter -->
    <filter id="glowFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Large glow -->
    <filter id="bigGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- Subtle background pattern — small dots -->
  <g opacity="0.08">
    <circle cx="200" cy="200" r="3" fill="#60a5fa"/>
    <circle cx="400" cy="150" r="2" fill="#60a5fa"/>
    <circle cx="600" cy="200" r="3" fill="#60a5fa"/>
    <circle cx="824" cy="180" r="2" fill="#60a5fa"/>
    <circle cx="150" cy="400" r="2" fill="#a78bfa"/>
    <circle cx="874" cy="350" r="3" fill="#a78bfa"/>
    <circle cx="100" cy="700" r="2" fill="#60a5fa"/>
    <circle cx="920" cy="720" r="2" fill="#60a5fa"/>
    <circle cx="250" cy="870" r="3" fill="#a78bfa"/>
    <circle cx="780" cy="880" r="2" fill="#a78bfa"/>
  </g>

  <!-- Nova burst glow behind the folder -->
  <ellipse cx="512" cy="440" rx="260" ry="220" fill="url(#novaBurst)" filter="url(#bigGlow)" opacity="0.7"/>

  <!-- === FOLDER SHAPE === -->
  <!-- Folder back (darker, gives depth) -->
  <g filter="url(#folderShadow)">
    <!-- Folder tab -->
    <path d="M 210 380 Q 210 340 250 340 L 420 340 Q 448 340 460 360 L 480 388 L 810 388 Q 840 388 840 418 L 840 680 Q 840 710 810 710 L 214 710 Q 184 710 184 680 L 184 410 Q 184 380 210 380 Z"
      fill="#1e3a5f" opacity="0.8"/>

    <!-- Folder front / main body -->
    <rect x="184" y="390" width="656" height="320" rx="22" ry="22" fill="url(#folderGrad)"/>

    <!-- Folder inner highlight — top edge -->
    <rect x="184" y="390" width="656" height="320" rx="22" ry="22" fill="url(#shine)"/>

    <!-- Folder lines (file list representation) -->
    <g opacity="0.25">
      <rect x="240" y="450" width="300" height="14" rx="7" fill="#ffffff"/>
      <rect x="240" y="482" width="220" height="14" rx="7" fill="#ffffff"/>
      <rect x="240" y="514" width="260" height="14" rx="7" fill="#ffffff"/>
      <rect x="240" y="546" width="180" height="14" rx="7" fill="#ffffff"/>
      <rect x="240" y="578" width="240" height="14" rx="7" fill="#ffffff"/>
      <rect x="240" y="610" width="200" height="14" rx="7" fill="#ffffff"/>
    </g>

    <!-- File icons on right side -->
    <g opacity="0.3">
      <rect x="600" y="446" width="44" height="56" rx="6" fill="#ffffff"/>
      <path d="M 626 446 L 644 446 L 644 462 L 626 462 Z" fill="url(#folderFrontGrad)" opacity="1"/>
      <rect x="668" y="446" width="44" height="56" rx="6" fill="#ffffff"/>
      <path d="M 694 446 L 712 446 L 712 462 L 694 462 Z" fill="url(#folderFrontGrad)" opacity="1"/>
    </g>
  </g>

  <!-- === NOVA STAR === -->
  <!-- Large glow halo behind star -->
  <circle cx="512" cy="320" r="90" fill="url(#novaBurst)" opacity="0.5" filter="url(#bigGlow)"/>

  <!-- Star rays (8-pointed) -->
  <g transform="translate(512, 320)" filter="url(#glowFilter)">
    <!-- Main 4 rays -->
    <g opacity="0.9">
      <polygon points="0,-110 8,-30 0,-8 -8,-30" fill="white"/>
      <polygon points="0,110 8,30 0,8 -8,30" fill="white"/>
      <polygon points="-110,0 -30,8 -8,0 -30,-8" fill="white"/>
      <polygon points="110,0 30,8 8,0 30,-8" fill="white"/>
    </g>
    <!-- 4 diagonal rays (shorter) -->
    <g opacity="0.55">
      <polygon points="-78,-78 -14,-24 -8,-8 -24,-14" fill="white"/>
      <polygon points="78,-78 14,-24 8,-8 24,-14" fill="white"/>
      <polygon points="-78,78 -14,24 -8,8 -24,14" fill="white"/>
      <polygon points="78,78 14,24 8,8 24,14" fill="white"/>
    </g>
    <!-- Star core glow -->
    <circle cx="0" cy="0" r="36" fill="url(#starGlow)"/>
    <!-- Inner white core -->
    <circle cx="0" cy="0" r="16" fill="white" opacity="0.95"/>
  </g>

  <!-- Small sparkles scattered around -->
  <g filter="url(#glowFilter)" opacity="0.7">
    <!-- Top-left sparkle -->
    <g transform="translate(300, 230)">
      <polygon points="0,-18 2,-5 0,-1 -2,-5" fill="#93c5fd"/>
      <polygon points="0,18 2,5 0,1 -2,5" fill="#93c5fd"/>
      <polygon points="-18,0 -5,2 -1,0 -5,-2" fill="#93c5fd"/>
      <polygon points="18,0 5,2 1,0 5,-2" fill="#93c5fd"/>
    </g>
    <!-- Top-right sparkle -->
    <g transform="translate(720, 200)">
      <polygon points="0,-14 2,-4 0,-1 -2,-4" fill="#c4b5fd"/>
      <polygon points="0,14 2,4 0,1 -2,4" fill="#c4b5fd"/>
      <polygon points="-14,0 -4,2 -1,0 -4,-2" fill="#c4b5fd"/>
      <polygon points="14,0 4,2 1,0 4,-2" fill="#c4b5fd"/>
    </g>
    <!-- Lower sparkle -->
    <g transform="translate(760, 560)">
      <polygon points="0,-10 1.5,-3 0,-0.8 -1.5,-3" fill="#818cf8"/>
      <polygon points="0,10 1.5,3 0,0.8 -1.5,3" fill="#818cf8"/>
      <polygon points="-10,0 -3,1.5 -0.8,0 -3,-1.5" fill="#818cf8"/>
      <polygon points="10,0 3,1.5 0.8,0 3,-1.5" fill="#818cf8"/>
    </g>
  </g>

  <!-- Outer rim shine (top-left arc) -->
  <path d="M 220 60 Q 512 20 804 60" stroke="white" stroke-width="2" fill="none" opacity="0.06" stroke-linecap="round"/>

  <!-- Final shine overlay on the whole icon -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#shine)" opacity="0.5"/>
</svg>
